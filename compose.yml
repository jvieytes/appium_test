services:
  android-emulator:
    image: budtmo/docker-android:emulator_14.0
    container_name: android-emulator
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    environment:
      EMULATOR_DEVICE: "Samsung Galaxy S10"
      WEB_VNC: "false"
      WEB_LOG: "false"
      EMULATOR_DATA_PARTITION: "2048m"
      EMULATOR_NO_SKIN: "true"
      EMULATOR_ADDITIONAL_ARGS: >-
        -no-window
        -no-audio
        -no-boot-anim
        -no-snapshot
        -gpu swiftshader_indirect
        -memory 4096
        -partition-size 2048
        -camera-back none
        -camera-front none
    volumes:
      - android-data:/home/androidusr
    shm_size: "2gb"
    cpus: 4
    mem_limit: "6g"
    healthcheck:
      test: [ "CMD-SHELL", "test -f device_status && ! grep -qE 'BOOTING|STARTING' device_status" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  appium:
    image: appium/appium
    container_name: appium-server
    privileged: true
    depends_on:
      android-emulator:
        condition: service_healthy
    ports:
      - "4723:4723"
    environment:
      REMOTE_ADB: "true"
      ANDROID_DEVICES: "android-emulator:5555"
      REMOTE_ADB_POLLING_SEC: "20"
      APPIUM_ADDITIONAL_PARAMS: "--relaxed-security"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:4723/status >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  android-data: